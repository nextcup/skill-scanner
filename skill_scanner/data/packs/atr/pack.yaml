# ATR (Agent Threat Rules) Rule Pack for Cisco Skill Scanner
# Source: https://github.com/Agent-Threat-Rule/agent-threat-rules
# Version: 2.0.12
# Full ATR community ruleset: 314 rules across 9 attack categories.
# Replaces v0.4.0 (34 rules, 3 files) from PR #79.
# MIT License. Auto-indexed from 10 category signature files.

pack:
  id: atr
  name: ATR Agent Threat Rules
  version: 2.0.12
  description: 'Open-source AI agent security detection rules from the Agent Threat
    Rules (ATR) project. 314 rules across 9 attack categories: prompt injection, agent
    manipulation, skill compromise, context exfiltration, tool poisoning, privilege
    escalation, model abuse, excessive autonomy, and model security. Benchmarks: 97.1%
    recall on NVIDIA garak 666 in-the-wild jailbreaks, 100% recall on 498 labeled
    SKILL.md samples, 99.6% precision on 850 PINT adversarial samples. OWASP Agentic
    Top 10: 10/10. MIT license.'
  author: ATR Community
  license: MIT
  source_url: https://github.com/Agent-Threat-Rule/agent-threat-rules
  signature_files:
  - signatures/atr_agent_manipulation.yaml
  - signatures/atr_context_exfiltration.yaml
  - signatures/atr_data_poisoning.yaml
  - signatures/atr_excessive_autonomy.yaml
  - signatures/atr_model_abuse.yaml
  - signatures/atr_model_security.yaml
  - signatures/atr_privilege_escalation.yaml
  - signatures/atr_prompt_injection.yaml
  - signatures/atr_skill_compromise.yaml
  - signatures/atr_tool_poisoning.yaml

