    category: prompt_injection
    severity: HIGH
    patterns:
      - >-
        (?i)\b(ignore|disregard|forget|override)\b.{0,40}\b(instruction|rule|system|prompt)\b.{0,60}(base64|atob|btoa|\\x[0-9a-f]{2}|\\u[0-9a-f]{4})
      - (?i)(eval|decode|atob|fromCharCode|String\.fromCodePoint)\s*\(\s*['"]([A-Za-z0-9+/=]{20,}|\\x[0-9a-f]{2})
      - (?i)(\\u0{0,2}[0-9a-f]{2,4}\s*){5,}
      - \xE2\x80\x8F|\xE2\x80\xAE|\u200F|\u202E|\u2066|\u2067|\u2068|\u2069
      - (?i)xn--[a-z0-9]{4,}\.\s*.{0,30}\b(ignore|new instructions|system prompt)
    file_types:
      - markdown
      - json
      - text
      - yaml
    description: >-
      Detects prompt injection attempts that use encoding techniques to bypass text-based detection rules. Attackers
      encode malicious payloads using base64, hex, Unicode escapes, Punycode, or RTL override characters to smuggle
      instructions past regex-based filters.
    remediation: '[ATR-2026-080] Encoding-based prompt injection evasion detected. Category: prompt-injection, Severity: high.'
